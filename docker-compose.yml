version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: jarvisv3-backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    labels:
      com.jarvis.project: "JARVISv3"
      com.jarvis.service: "backend"
      com.jarvis.variant: "prod"
    environment:
      - DATABASE_URL=${DATABASE_URL:-sqlite+aiosqlite:////app/data/JARVISv3.db}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-change_me_in_production}
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8000
      - LOG_LEVEL=info
      - PRIVACY_LEVEL=${PRIVACY_LEVEL:-medium}
      - MONTHLY_BUDGET_USD=${MONTHLY_BUDGET_USD:-100.0}
      - TOKEN_BUDGET_PER_WORKFLOW=${TOKEN_BUDGET_PER_WORKFLOW:-1000}
    volumes:
      - jarvis_data:/app/data
      - jarvis_logs:/app/logs
      - JARVISv3_media:/app/media
      - jarvis_models:/app/models
      - jarvis_checkpoints:/app/checkpoints
    depends_on:
      - redis
    networks:
      - JARVISv3_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 1G
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    volumes:
      - frontend_build:/frontend
    depends_on:
      - backend
    networks:
      - JARVISv3_network
    restart: unless-stopped


  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - JARVISv3_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - frontend_build:/usr/share/nginx/html
    depends_on:
      - backend
      - frontend
    networks:
      - JARVISv3_network
    restart: unless-stopped




volumes:
  redis_data:
  JARVISv3_media:
  jarvis_data:
  jarvis_logs:
  frontend_build:
  jarvis_models:
  jarvis_checkpoints:

networks:
  JARVISv3_network:
    driver: bridge
